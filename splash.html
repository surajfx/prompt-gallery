<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050508;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Syne', sans-serif;
  }

  /* Animated background particles */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(255,200,50,0.4);
    border-radius: 50%;
    animation: float linear infinite;
  }

  @keyframes float {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  .splash {
    text-align: center;
    position: relative;
    z-index: 10;
  }

  /* THE S LOGO */
  .logo-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 24px;
  }

  .logo-ring {
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    border: 1px solid rgba(255,190,30,0.2);
    animation: ringPulse 2s ease-in-out infinite;
  }

  .logo-ring-2 {
    position: absolute;
    inset: -35px;
    border-radius: 50%;
    border: 1px solid rgba(255,190,30,0.1);
    animation: ringPulse 2s ease-in-out infinite 0.4s;
  }

  @keyframes ringPulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.05); opacity: 1; }
  }

  .logo-circle {
    width: 100px;
    height: 100px;
    border-radius: 28px;
    background: linear-gradient(135deg, #1a1400 0%, #3d2e00 50%, #ffc107 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 0 40px rgba(255,190,30,0.3),
      0 0 80px rgba(255,190,30,0.15),
      inset 0 1px 0 rgba(255,255,255,0.1);
    animation: logoReveal 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    position: relative;
    overflow: hidden;
  }

  .logo-circle::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: conic-gradient(transparent 0deg, rgba(255,190,30,0.1) 60deg, transparent 120deg);
    animation: shimmer 3s linear infinite;
  }

  @keyframes shimmer {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes logoReveal {
    from { transform: scale(0) rotate(-20deg); opacity: 0; }
    to { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .logo-s {
    font-family: 'Syne', sans-serif;
    font-size: 56px;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 0 20px rgba(255,190,30,0.8), 0 2px 4px rgba(0,0,0,0.5);
    position: relative;
    z-index: 1;
    line-height: 1;
  }

  .brand-name {
    font-size: 18px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    letter-spacing: 4px;
    text-transform: uppercase;
    animation: fadeIn 0.6s 0.5s ease both;
    margin-bottom: 8px;
  }

  .brand-sub {
    font-size: 12px;
    color: rgba(255,190,30,0.6);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-family: 'DM Sans', sans-serif;
    animation: fadeIn 0.6s 0.7s ease both;
    margin-bottom: 48px;
  }

  /* LOADING BAR */
  .loading-bar-wrap {
    width: 200px;
    height: 2px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    margin: 0 auto;
    overflow: hidden;
    animation: fadeIn 0.6s 0.9s ease both;
  }

  .loading-bar {
    height: 100%;
    background: linear-gradient(90deg, #ffc107, #ff9800);
    border-radius: 2px;
    animation: loadBar 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    box-shadow: 0 0 8px rgba(255,190,30,0.6);
  }

  @keyframes loadBar {
    0% { width: 0%; }
    60% { width: 75%; }
    90% { width: 92%; }
    100% { width: 100%; }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Page transition out */
  body.fade-out {
    animation: pageOut 0.5s ease forwards;
  }

  @keyframes pageOut {
    to { opacity: 0; transform: scale(1.05); }
  }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="splash">
  <div class="logo-wrap">
    <div class="logo-ring"></div>
    <div class="logo-ring-2"></div>
    <div class="logo-circle">
      <span class="logo-s">S</span>
    </div>
  </div>
  <div class="brand-name">Prompt Gallery</div>
  <div class="brand-sub">AI Image Prompts</div>
  <div class="loading-bar-wrap">
    <div class="loading-bar"></div>
  </div>
</div>

<script>
  // Generate particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (4 + Math.random() * 6) + 's';
    p.style.animationDelay = (Math.random() * 4) + 's';
    p.style.width = p.style.height = (1 + Math.random() * 3) + 'px';
    container.appendChild(p);
  }

  // Redirect to home after loading
  setTimeout(() => {
    document.body.classList.add('fade-out');
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 500);
  }, 3000);
</script>
</body>
</html>
